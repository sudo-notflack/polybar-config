[colors]
background = #00061F
background-alt = #373B41
foreground = #3E54BD
primary = #96A8FF
secondary = #1F2F99
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 20pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 5pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = Monocraft;2

modules-left = xworkspaces traybutton 
modules-right = battery pulseaudio backlight xkeyboard date 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

override-redirect = true

[module/traybutton]
type = custom/text
content = ">.<"
content-foreground = #0006FF
click-left = pgrep -x trayer > /dev/null && pkill trayer || trayer --edge top --align left --widthtype request --height 24 --transparent true --alpha 0 --tint 0x00061F --distance 7 --margin 250 &
click-right = rofi -show drun

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "Зв. "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = Откл.
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 1
label-indicator-margin = 0
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/battery]
type = internal/battery

battery = BAT1
adapter = AC
full-at = 100

format-charging = <label-charging>
label-charging = %percentage%%
label-charging-foreground = #00FF00

format-discharging = <label-discharging>
label-discharging = %percentage%%
format-discharging-foreground = #FFFFFF

# Если батарея полная
format-full = <label-full>
label-full = 100
format-full-foreground = #555555




[module/date]
type = internal/date
interval = 1

date = %H:%M:%S
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini


[module/backlight]
type = internal/backlight
card = intel_backlight

use-actual-brightness = true

poll-interval = 0

enable-scroll = true

scroll-interval = 10