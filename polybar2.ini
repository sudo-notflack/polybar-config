[colors]
background = #00061F
background-alt = #373B41
foreground = #3E54BD
primary = #96A8FF
secondary = #1F2F99
alert = #A54242
disabled = #707880




[bar/brightness]
monitor = ${env:MONITOR:}
width = 5%
height = 20pt
offset-x = 773px
offset-y = 1%
radius = 6
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-size = 1pt
border-color = ${colors.primary}
font-0 = Monocraft;2
modules-center = backlight
cursor-click = pointer








[bar/audio]
monitor = ${env:MONITOR:}
width = 5%
height = 20pt
offset-x = 827px
offset-y = 1%
radius = 6
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-size = 1pt
border-color = ${colors.primary}
font-0 = Monocraft;2
modules-center = pulseaudio
cursor-click = pointer








[bar/lang]
monitor = ${env:MONITOR:}
width = 3%
height = 20pt
offset-x = 881px
offset-y = 1%
radius = 6
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 1pt
border-color = ${colors.primary}


