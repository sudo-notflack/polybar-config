; --- ЛЕВЫЙ ОСТРОВОК (Воркспейсы) ---
[bar/left]
monitor = ${env:MONITOR:}
width = 171px
height = 20pt
offset-x = 5px
offset-y = 1%
radius = 6
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 1pt
border-color = ${colors.primary}

padding-left = 2px
padding-right = 0
module-margin = 1

font-0 = Monocraft;2

modules-left = xworkspaces
cursor-click = pointer
enable-ipc = true
override-redirect = true

; --- ПРАВЫЙ ОСТРОВОК (Система и время) ---
[bar/battery]
monitor = ${env:MONITOR:}
width = 5%
height = 20pt
offset-x = 719px
offset-y = 1%
radius = 6
fixed-center = true

separator = |

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1pt
border-size = 1pt
border-color = ${colors.primary}

padding-left = 0
padding-right = 0
module-margin = 1

font-0 = Monocraft;2

modules-center = battery
cursor-click = pointer
enable-ipc = true
override-redirect = true

; --- ТВОИ МОДУЛИ (БЕЗ ИЗМЕНЕНИЙ) ---

[module/traybutton]
type = custom/text
content = ">.<"
content-foreground = #0006FF
click-left = pgrep -x trayer > /dev/null && pkill trayer || trayer --edge top --align left --widthtype request --height 24 --transparent true --alpha 0 --tint 0x00061F --distance 7 --margin 225 &
click-right = rofi -show drun

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = ""
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = Откл.
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.primary}

[module/battery]
type = internal/battery
battery = BAT1
adapter = AC
full-at = 100
format-charging = <label-charging>
label-charging = %percentage%%
label-charging-foreground = #00FF00
format-discharging = <label-discharging>
label-discharging = %percentage%%
format-discharging-foreground = #FFFFFF
format-full = <label-full>
label-full = 100%
format-full-foreground = #555555

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true

[settings]
screenchange-reload = true
pseudo-transparency = true