width = 10%
height = 20pt
offset-x = 915px
offset-y = 1%
radius = 6
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 1pt
border-color = ${colors.primary}

padding-left = 3px
padding-right = 3px
module-margin = 1

font-0 = Monocraft;2

modules-center = date
